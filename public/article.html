<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AICrash.news - AI Crash News Monitor</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/i18n.js"></script>
  <meta name="description" id="meta-description" content="AI industry crash monitoring and analysis">
  <meta property="og:title" id="og-title" content="AICrash.news">
  <meta property="og:description" id="og-description" content="AI industry crash monitoring and analysis">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="AICrash.news">
  <meta name="twitter:card" content="summary_large_image">
  <script type="application/ld+json" id="schema-data"></script>
</head>
<body class="article-page">
  <main class="article-container">
    <article class="article-content" id="article-content">
      <div class="loading" data-i18n="loading">加载中...</div>
    </article>

    <aside class="article-sidebar">
      <div class="article-meta-card">
        <h3 class="meta-card-title" data-i18n="articleInfo">文章信息</h3>
        <div class="meta-item">
          <span class="meta-label" data-i18n="severityTitle">严重程度</span>
          <span class="meta-value" id="meta-severity">
            <span class="severity-dot-inline" id="severity-dot"></span>
            <span id="severity-text">-</span>
          </span>
        </div>
        <div class="meta-item">
          <span class="meta-label" data-i18n="categoryTitle">分类</span>
          <span class="meta-value" id="meta-category">-</span>
        </div>
        <div class="meta-item">
          <span class="meta-label" data-i18n="sourceTitle">来源</span>
          <span class="meta-value" id="meta-source">-</span>
        </div>
        <div class="meta-item">
          <span class="meta-label" data-i18n="publishedAt">发布时间</span>
          <span class="meta-value" id="meta-published">-</span>
        </div>
        <div class="meta-item">
          <span class="meta-label" data-i18n="addedAt">入库时间</span>
          <span class="meta-value" id="meta-created">-</span>
        </div>
      </div>

      <a href="#" class="read-original-btn" id="read-original" target="_blank" rel="noopener noreferrer" data-i18n="readOriginal">
        阅读原文 →
      </a>
    </aside>
  </main>

  <script src="/js/stats.js"></script>
  <script src="/js/header.js" defer></script>
  <script>
    const API_BASE = '/api';
    let articleData = null;

    const VIEWED_NEWS_KEY = 'aicrash_viewed_news';

    function getViewedSet() {
      try {
        const raw = localStorage.getItem(VIEWED_NEWS_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function getViewedIds() {
      const viewed = getViewedSet();
      return Object.keys(viewed).filter(k => viewed[k]).join(',');
    }

    async function markViewed(url, id) {
      if (!url) return;
      const viewed = getViewedSet();
      if (viewed[url]) return;
      viewed[url] = true;
      try {
        localStorage.setItem(VIEWED_NEWS_KEY, JSON.stringify(viewed));
      } catch (err) {
        console.error('Failed to save viewed set:', err);
      }
      if (id) {
        try {
          await fetch('/api/news/view', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Viewed-Key': getViewedIds(),
            },
            body: JSON.stringify({ id }),
          });
        } catch (err) {
          console.error('Failed to record view:', err);
        }
      }
    }

    function formatViewCount(count, lang) {
      return count + ' ' + (lang === 'zh' ? '次' : 'views');
    }

    function applyI18n() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (el.textContent !== undefined) {
          el.textContent = t(key);
        }
      });
      const langSwitch = document.getElementById('lang-switch');
      if (langSwitch) {
        langSwitch.querySelectorAll('.lang-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.lang === getLang());
        });
      }
      document.documentElement.lang = getLang() === 'zh' ? 'zh-CN' : 'en';
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(dateStr, lang) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return d.toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function renderArticle(data) {
      articleData = data;
      const lang = getLang();
      const container = document.getElementById('article-content');

      document.title = `${data.title} - AICrash.news`;

      const severityBadge = data.severity === 0
        ? '<div class="severity-badge s0">✓</div>'
        : `<div class="severity-badge s${data.severity || 1}">${data.severity || 1}</div>`;

      container.innerHTML = `
        <div class="article-header">
          ${severityBadge}
          <h1 class="article-title">${escapeHtml(data.title)}</h1>
        </div>
        ${data.summary ? `<div class="article-summary">${escapeHtml(data.summary)}</div>` : ''}
        <div class="article-footer">
          <div class="article-view-count" id="article-view-count">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <span class="view-count-number">0</span>
          </div>
          <a href="/#monitor" class="back-to-home" data-i18n="backToHome">← 返回首页</a>
        </div>
      `;

      const severityDot = document.getElementById('severity-dot');
      const severityText = document.getElementById('severity-text');
      const severity = data.severity;
      if (severity === 0) {
        severityDot.className = 'severity-dot-inline s0';
        severityText.textContent = t('positive');
      } else {
        severityDot.className = `severity-dot-inline s${severity || 1}`;
        severityText.textContent = severity || 1;
      }
      document.getElementById('meta-category').textContent = data.category_label || data.category || '-';
      document.getElementById('meta-source').textContent = data.source || '-';
      document.getElementById('meta-published').textContent = formatDate(data.published_at, lang);
      document.getElementById('meta-created').textContent = formatDate(data.created_at, lang);

      const viewCountEl = document.getElementById('article-view-count');
      if (viewCountEl) {
        const numberEl = viewCountEl.querySelector('.view-count-number');
        if (numberEl) numberEl.textContent = data.view_count || 0;
        markViewed(data.url, data.id);
      }

      const readOriginal = document.getElementById('read-original');
      readOriginal.href = data.url || '#';

      const metaDesc = document.getElementById('meta-description');
      const ogTitle = document.getElementById('og-title');
      const ogDesc = document.getElementById('og-description');
      if (metaDesc) metaDesc.content = data.summary || data.title;
      if (ogTitle) ogTitle.content = data.title;
      if (ogDesc) ogDesc.content = data.summary || data.title;

      const schemaData = document.getElementById('schema-data');
      if (schemaData) {
        const schema = {
          "@context": "https://schema.org",
          "@type": "NewsArticle",
          "headline": data.title,
          "description": data.summary || '',
          "datePublished": data.published_at,
          "dateModified": data.created_at,
          "publisher": {
            "@type": "Organization",
            "name": "AICrash.news",
            "url": window.location.origin
          },
          "sourceOrganization": {
            "@type": "Organization",
            "name": data.source || 'Unknown'
          },
          "articleSection": data.category || '',
          "keywords": ['AI', 'crash', 'news', data.category || ''].filter(Boolean).join(', ')
        };
        if (data.url) {
          schema.url = data.url;
        }
        schemaData.textContent = JSON.stringify(schema);
      }
    }

    function showError(message) {
      const container = document.getElementById('article-content');
      container.innerHTML = `
        <div class="error-state">
          <div class="error-icon">⚠️</div>
          <div class="error-text">${escapeHtml(message)}</div>
          <a href="/#monitor" class="back-home" data-i18n="backHome">返回首页</a>
        </div>
      `;
      applyI18n();
    }

    async function loadArticle() {
      const pathParts = window.location.pathname.split('/');
      let idOrUrl = pathParts[pathParts.length - 1];
      idOrUrl = decodeURIComponent(idOrUrl);
      const lang = getLang();

      try {
        const res = await fetch(`${API_BASE}/news/article?id=${encodeURIComponent(idOrUrl)}&lang=${lang}`);
        if (!res.ok) {
          throw new Error(res.status === 404 ? (lang === 'zh' ? '文章不存在' : 'Article not found') : 'Failed to load article');
        }
        const data = await res.json();
        renderArticle(data);
        applyI18n();
      } catch (err) {
        console.error('Failed to load article:', err);
        showError(err.message || (lang === 'zh' ? '加载失败' : 'Failed to load'));
      }
    }

    document.addEventListener('click', (e) => {
      const langBtn = e.target.closest('.lang-btn');
      if (langBtn) {
        const newLang = langBtn.dataset.lang;
        if (newLang && newLang !== getLang()) {
          setLanguage(newLang);
          applyI18n();
          loadHeaderStats(newLang);
          if (articleData) {
            renderArticle(articleData);
          }
        }
      }
    });

    function init() {
      if (window.headerPromise) {
        window.headerPromise.then(() => {
          applyI18n();
          loadHeaderStats();
          loadArticle();
        });
      } else {
        setTimeout(init, 50);
      }
    }
    init();
  </script>
</body>
</html>
