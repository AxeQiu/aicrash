<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="logo-icon">⚡</span>
      <h1>AICrash<span class="logo-accent">.news</span></h1>
    </a>
    <div class="header-right">
      <div class="header-stats">
        <div class="stat">
          <span class="stat-value" id="total-count">—</span>
          <span class="stat-label" data-i18n="totalLabel">总收录</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="today-count">—</span>
          <span class="stat-label" data-i18n="todayLabel">今日新增</span>
        </div>
      </div>
      <div class="live-indicator" id="live-indicator">
        <span class="live-dot"></span>
        <span>LIVE</span>
      </div>
      <div class="lang-switch" id="lang-switch">
        <button class="lang-btn active" data-lang="zh">中</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="mobile-menu" id="mobile-menu">
    <div class="mobile-menu-content">
      <div class="mobile-stat">
        <span class="stat-value" id="m-total-count">—</span>
        <span class="stat-label" data-i18n="totalLabel">总收录</span>
      </div>
      <div class="mobile-stat">
        <span class="stat-value" id="m-today-count">—</span>
        <span class="stat-label" data-i18n="todayLabel">今日新增</span>
      </div>
    </div>
  </div>
</header>
