</head>
<body>
  <div class="hero-section">
    <canvas id="hero-canvas"></canvas>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-badge">
        <span class="hero-badge-dot"></span>
        <span class="hero-badge-text" data-i18n="heroBadge">MONITORING ACTIVE</span>
      </div>
      <h2 class="hero-title">
        <span class="hero-title-prefix">&gt;_</span>
        <span class="hero-title-text" data-i18n="heroTitle">AI Industry Crash Monitor</span>
      </h2>
      <div class="hero-typewriter">
        <span class="hero-typewriter-prefix">$</span>
        <span id="hero-typewriter-text"></span>
        <span class="hero-cursor">|</span>
      </div>
      <div class="hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-value" id="hero-total">—</span>
          <span class="hero-stat-label" data-i18n="totalLabel">总收录</span>
        </div>
        <div class="hero-stat-divider"></div>
        <div class="hero-stat">
          <span class="hero-stat-value" id="hero-today">—</span>
          <span class="hero-stat-label" data-i18n="todayLabel">今日新增</span>
        </div>
        <div class="hero-stat-divider"></div>
        <div class="hero-stat">
          <span class="hero-stat-value" id="hero-severity">—</span>
          <span class="hero-stat-label" data-i18n="heroAvgSeverity">平均严重度</span>
        </div>
      </div>
      <button class="hero-scroll-btn" id="hero-scroll-btn" data-i18n="heroScrollDown">
        ▼ 进入监控台
      </button>
    </div>
  </div>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="filter-section">
        <h3 class="filter-title" data-i18n="searchTitle">搜索</h3>
        <div class="search-box">
          <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="搜索标题或摘要...">
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title" data-i18n="severityTitle">严重程度</h3>
        <div class="severity-filter">
          <button class="severity-btn severity-btn-text active" data-severity="" data-i18n="all">全部</button>
          <button class="severity-btn" data-severity="5">
            <span class="severity-dot s5"></span>
          </button>
          <button class="severity-btn" data-severity="4">
            <span class="severity-dot s4"></span>
          </button>
          <button class="severity-btn" data-severity="3">
            <span class="severity-dot s3"></span>
          </button>
          <button class="severity-btn" data-severity="2">
            <span class="severity-dot s2"></span>
          </button>
          <button class="severity-btn" data-severity="1">
            <span class="severity-dot s1"></span>
          </button>
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title" data-i18n="categoryTitle">分类</h3>
        <div class="category-filter" id="category-filter">
          <button class="category-btn active" data-category="" data-i18n="all">全部</button>
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title" data-i18n="sourceTitle">来源</h3>
        <div class="source-filter" id="source-filter">
          <button class="source-btn active" data-source="" data-i18n="all">全部</button>
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title" data-i18n="dateRangeTitle">时间范围</h3>
        <div class="date-filter">
          <select id="date-range">
            <option value="" data-i18n="allTime">全部时间</option>
            <option value="1" data-i18n="last1d">最近1天</option>
            <option value="7" data-i18n="last7d">最近7天</option>
            <option value="30" selected data-i18n="last30d">最近30天</option>
            <option value="90" data-i18n="last90d">最近90天</option>
          </select>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="news-feed" id="news-feed">
        <div class="loading" id="loading" data-i18n="loading">加载中...</div>
      </div>
      <div class="load-more" id="load-more" style="display:none;">
        <button id="load-more-btn" data-i18n="loadMore">加载更多</button>
      </div>
    </main>

    <aside class="trends-panel">
      <h3 class="trends-title" data-i18n="trendsTitle">趋势</h3>
      <div class="chart-container">
        <canvas id="trend-chart"></canvas>
      </div>
      <div class="trend-period">
        <button class="period-btn active" data-period="day" data-i18n="byDay">按天</button>
        <button class="period-btn" data-period="week" data-i18n="byWeek">按周</button>
      </div>
    </aside>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/stats.js"></script>
  <script src="/js/header.js" defer></script>
  <script src="/js/sse.js" defer></script>
  <script src="/js/app.js" defer></script>
</body>
</html>
