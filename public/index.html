<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>aicrash.news — AI Industry Crash Monitor</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-388BLBXTP1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-388BLBXTP1');
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <h1>aicrash<span class="logo-dot">.news</span></h1>
      </div>
      <div class="header-right">
        <div class="header-stats">
          <div class="stat">
            <span class="stat-value" id="total-count">—</span>
            <span class="stat-label" data-i18n="totalLabel">总收录</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="today-count">—</span>
            <span class="stat-label" data-i18n="todayLabel">今日新增</span>
          </div>
        </div>
        <div class="live-indicator" id="live-indicator">
          <span class="live-dot"></span>
          <span>LIVE</span>
        </div>
        <div class="lang-switch" id="lang-switch">
          <button class="lang-btn active" data-lang="zh">中</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button class="hamburger" id="hamburger">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-menu-content">
        <div class="mobile-stat">
          <span class="stat-value" id="m-total-count">—</span>
          <span class="stat-label" data-i18n="totalLabel">总收录</span>
        </div>
        <div class="mobile-stat">
          <span class="stat-value" id="m-today-count">—</span>
          <span class="stat-label" data-i18n="todayLabel">今日新增</span>
        </div>
      </div>
    </div>
  </header>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="filter-section">
        <h3 class="filter-title" data-i18n="searchTitle">搜索</h3>
        <div class="search-box">
          <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="搜索标题或摘要...">
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title" data-i18n="severityTitle">严重程度</h3>
        <div class="severity-filter">
          <button class="severity-btn active" data-severity="" data-i18n="all">全部</button>
          <button class="severity-btn" data-severity="0">
            <span class="severity-dot s0"></span>
          </button>
          <button class="severity-btn" data-severity="5">
            <span class="severity-dot s5"></span>
          </button>
          <button class="severity-btn" data-severity="4">
            <span class="severity-dot s4"></span>
          </button>
          <button class="severity-btn" data-severity="3">
            <span class="severity-dot s3"></span>
          </button>
          <button class="severity-btn" data-severity="2">
            <span class="severity-dot s2"></span>
          </button>
          <button class="severity-btn" data-severity="1">
            <span class="severity-dot s1"></span>
          </button>
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title" data-i18n="categoryTitle">分类</h3>
        <div class="category-filter" id="category-filter">
          <button class="category-btn active" data-category="" data-i18n="all">全部</button>
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title" data-i18n="sourceTitle">来源</h3>
        <div class="source-filter" id="source-filter">
          <button class="source-btn active" data-source="" data-i18n="all">全部</button>
        </div>
      </div>

      <div class="filter-section">
        <h3 class="filter-title" data-i18n="dateRangeTitle">时间范围</h3>
        <div class="date-filter">
          <select id="date-range">
            <option value="" data-i18n="allTime">全部时间</option>
            <option value="1" data-i18n="last1d">最近1天</option>
            <option value="7" data-i18n="last7d">最近7天</option>
            <option value="30" selected data-i18n="last30d">最近30天</option>
            <option value="90" data-i18n="last90d">最近90天</option>
          </select>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="news-feed" id="news-feed">
        <div class="loading" id="loading" data-i18n="loading">加载中...</div>
      </div>
      <div class="load-more" id="load-more" style="display:none;">
        <button id="load-more-btn" data-i18n="loadMore">加载更多</button>
      </div>
    </main>

    <aside class="trends-panel">
      <h3 class="trends-title" data-i18n="trendsTitle">趋势</h3>
      <div class="chart-container">
        <canvas id="trend-chart"></canvas>
      </div>
      <div class="trend-period">
        <button class="period-btn active" data-period="day" data-i18n="byDay">按天</button>
        <button class="period-btn" data-period="week" data-i18n="byWeek">按周</button>
      </div>
    </aside>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/sse.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
